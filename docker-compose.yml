services:
  postgres:
    image: postgres:18-alpine
    container_name: kietec-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: kietec
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: kietec_dev
    ports:
      - "5432:5432"
    volumes:
      - kietec-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kietec -d kietec_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kietec-postgres-data: